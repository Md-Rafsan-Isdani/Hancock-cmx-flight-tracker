<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMX Flight Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header-content">
        <h1>✈ CMX Live Dashboard</h1>
        <input type="date" id="datePicker">
    </div>
</header>

<main>

    <section class="card">
        <h2>Flight Information</h2>

        <div class="flight-grid">
            <div class="flight-box">
                <h3>Arrivals</h3>
                <table id="arrivalsTable"></table>
            </div>

            <div class="flight-box">
                <h3>Departures</h3>
                <table id="departuresTable"></table>
            </div>
        </div>
    </section>

    <section class="card weather-card">
        <h2>Weather in Houghton</h2>
        <div id="weatherData" class="weather-grid"></div>
    </section>

    <section class="card webcam-card">
        <h2>Live Airport Webcam</h2>
        <div class="webcam-wrapper">
            <img id="webcamFeed" src="" alt="Airport Webcam">
        </div>
    </section>

</main>

<footer>
    <p>Live Data • Auto-updating every 60 seconds</p>
</footer>

<script src="script.js"></script>
</body>
</html>
