<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMX Airport Operations Dashboard</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="topbar">
    <div class="logo">
        <h1>CMX Operations</h1>
        <span>Houghton County Memorial Airport</span>
    </div>

    <div class="controls">
        <label>Select Date</label>
        <input type="date" id="datePicker">
    </div>
</header>

<main class="dashboard">

    <!-- Flights -->
    <section class="panel">
        <div class="panel-header">
            <h2>Flight Activity</h2>
            <span class="live-indicator">● LIVE</span>
        </div>

        <div class="flight-sections">
            <div class="flight-panel">
                <h3>Arrivals</h3>
                <table id="arrivalsTable"></table>
            </div>

            <div class="flight-panel">
                <h3>Departures</h3>
                <table id="departuresTable"></table>
            </div>
        </div>
    </section>

    <!-- Weather -->
    <section class="panel weather">
        <div class="panel-header">
            <h2>Weather</h2>
        </div>
        <div id="weatherData" class="weather-content"></div>
    </section>

    <!-- Webcam -->
    <section class="panel webcam">
        <div class="panel-header">
            <h2>Runway Camera</h2>
        </div>
        <img id="webcamFeed" alt="Airport Webcam">
    </section>

</main>

<footer class="footer">
    <p>Data updates every 60 seconds • CMX Airport Monitoring System</p>
</footer>

<script src="script.js"></script>
</body>
</html>
